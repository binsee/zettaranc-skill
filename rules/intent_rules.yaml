# 意图识别规则
# 优先级：stock > career > life > chat

stock:
  priority: 10
  description: "股票、投资、交易、行情相关"
  keywords:
    - 股票
    - 行情
    - B1
    - B2
    - B3
    - SB1
    - KDJ
    - MACD
    - RSI
    - 仓位
    - 止损
    - 止盈
    - 选股
    - 盘面
    - K线
    - 涨停
    - 跌停
    - 均线
    - 布林带
    - 资金流
    - 财报
    - PE
    - PB
    - 分红
    - 回测
    - 战法
    - 长安战法
    - 出货五式
    - 防卖飞
    - 麒麟会
    - 三波理论
    - 砖形图
    - 双线
    - 量能
    - 量比
    - 放量
    - 缩量
    - 洗盘
    - 拉升
    - 建仓
    - 复盘
    - 交作业
    - 随堂测试
    - 600
    - 300
    - 000
    - 688
  patterns:
    - "[0-9]{6}\\.(SH|SZ)"
    - "^.*[0-9]{6}.*$"
    - "涨[0-9]+"
    - "跌[0-9]+"
    - "[0-9]+\\.(SZ|SH)"

